name: Crate

# mcp uses standalone Rust crates, so cargo checks run on the runner instead of a crate-local
# "ci-tools" Docker target; the runtime image still supports BINARY_SOURCE=prebuilt for publish parity.
on:
  workflow_call:
    inputs:
      crate:
        required: true
        type: string

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    env:
      CRATE: ${{ inputs.crate }}
      SERVICE: mcp-${{ inputs.crate }}
      BINARY: botwork-mcp-${{ inputs.crate }}
      DOCKERFILE: ${{ inputs.crate }}/Dockerfile

    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: |
          ${{ inputs.crate }}
    - uses: docker/setup-buildx-action@v3

    - name: cargo fmt
      run: |
        set -euo pipefail
        cd "$CRATE"
        cargo fmt -- --check

    - name: cargo clippy
      run: |
        set -euo pipefail
        cd "$CRATE"
        cargo clippy --all-targets --locked -- -D warnings

    - name: cargo test
      run: |
        set -euo pipefail
        cd "$CRATE"
        cargo test --locked

    - name: cargo build
      env:
        BOTWORK_GIT_SHA: ${{ github.sha }}
      run: |
        set -euo pipefail
        cd "$CRATE"
        cargo build --release --locked

    - name: Install hadolint
      run: |
        set -euo pipefail
        HADOLINT_VERSION=v2.12.0
        curl -fsSL -o /usr/local/bin/hadolint \
          "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64"
        chmod +x /usr/local/bin/hadolint
        hadolint --version

    - name: Lint Dockerfile
      run: hadolint --failure-threshold error "$DOCKERFILE"

    - name: Stage prebuilt binary
      run: |
        set -euo pipefail
        install -D -m 0755 "$CRATE/target/release/$BINARY" ".ci-prebuilt/$CRATE/$BINARY"

    - name: Read VERSION
      id: version
      run: |
        set -euo pipefail
        echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

    - name: Build runtime image
      env:
        BOTWORK_VERSION: ${{ steps.version.outputs.version }}
      run: |
        set -euo pipefail
        docker buildx build \
          --platform linux/amd64 \
          --load \
          --build-arg BINARY_SOURCE=prebuilt \
          --build-arg "GIT_SHA=${GITHUB_SHA}" \
          --build-arg "BOTWORK_VERSION=${BOTWORK_VERSION}" \
          --build-arg "BOTWORK_GIT_SHA=${GITHUB_SHA}" \
          -t "botwork/$SERVICE:ci" \
          -f "$DOCKERFILE" \
          .

    - name: Verify OCI labels
      env:
        BOTWORK_VERSION: ${{ steps.version.outputs.version }}
      run: |
        set -euo pipefail
        image="botwork/${SERVICE}:ci"
        expect_source="https://github.com/botworkz/mcp"
        actual_version="$(docker image inspect "$image" \
          --format '{{ index .Config.Labels "org.opencontainers.image.version" }}')"
        actual_revision="$(docker image inspect "$image" \
          --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
        actual_source="$(docker image inspect "$image" \
          --format '{{ index .Config.Labels "org.opencontainers.image.source" }}')"
        fail=0
        if [ "$actual_version" != "$BOTWORK_VERSION" ]; then
          echo "::error::image.version mismatch on $image: expected '$BOTWORK_VERSION', got '$actual_version'"
          fail=1
        fi
        if [ "$actual_revision" != "$GITHUB_SHA" ]; then
          echo "::error::image.revision mismatch on $image: expected '$GITHUB_SHA', got '$actual_revision'"
          fail=1
        fi
        if [ "$actual_source" != "$expect_source" ]; then
          echo "::error::image.source mismatch on $image: expected '$expect_source', got '$actual_source'"
          fail=1
        fi
        if [ "$fail" -ne 0 ]; then
          exit 1
        fi
        echo "OCI labels OK on $image: version=$actual_version revision=${actual_revision:0:7} source=$actual_source"

    - name: Smoke test image
      run: |
        set -euo pipefail
        cid="$(docker run -d --rm -p 18000:8000 "botwork/$SERVICE:ci")"
        cleanup() {
          docker rm -f "$cid" >/dev/null 2>&1 || true
        }
        trap cleanup EXIT

        ready=false
        for _ in $(seq 1 30); do
          if docker logs "$cid" 2>&1 | grep -q 'starting on 0.0.0.0:8000/mcp'; then
            ready=true
            break
          fi
          sleep 0.5
        done

        if [ "$ready" != true ]; then
          echo "container never reported readiness"
          docker logs "$cid" || true
          exit 1
        fi

        # Version banner: assert botwork-mcp-echo <ver>[+<sha>] is in the log.
        banner="$(docker logs "$cid" 2>&1 | grep -oE 'botwork-mcp-echo [^[:space:]]+' | head -n1 || true)"
        echo "version banner: $banner"
        if [ -z "$banner" ]; then
          echo "::error::no botwork-mcp-echo version banner in container log"
          docker logs "$cid" || true
          exit 1
        fi

        # If VERSION is dev, require a +<short-sha> suffix.
        version="$(tr -d '[:space:]' < VERSION)"
        case "$version" in
          *-dev*)
            if ! printf '%s\n' "$banner" | grep -qE '\+[0-9a-f]{7}'; then
              echo "::error::dev VERSION '$version' but banner lacks +<sha>: '$banner'"
              docker logs "$cid" || true
              exit 1
            fi
            ;;
        esac

        code="$(curl -s -o /dev/null -w '%{http_code}' -X POST http://127.0.0.1:18000/mcp || true)"
        echo "smoke http code: $code"
        if [ -z "$code" ] || [ "$code" = "000" ]; then
          docker logs "$cid" || true
          exit 1
        fi

        docker logs "$cid"

    - name: Generate org.botwork.mcp.* labels
      uses: botworkz/botwork/actions/mcp-probe@v0.3.17
      with:
        mode: generate
        image: botwork/${{ env.SERVICE }}:ci
        package: ${{ env.CRATE }}/mcp-package.yaml
        out: botwork/${{ env.SERVICE }}:ci-labeled
        tools_version: v0.3.17

    - name: Verify labels match re-probed catalog
      uses: botworkz/botwork/actions/mcp-probe@v0.3.17
      with:
        mode: verify
        image: botwork/${{ env.SERVICE }}:ci-labeled
        package: ${{ env.CRATE }}/mcp-package.yaml
        tools_version: v0.3.17

    - uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.crate }}-binary
        path: ${{ env.CRATE }}/target/release/${{ env.BINARY }}
