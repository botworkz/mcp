name: Crate

# mcp uses standalone Rust crates, so cargo checks run on the runner instead of a crate-local
# "ci-tools" Docker target; the runtime image still supports BINARY_SOURCE=prebuilt for publish parity.
on:
  workflow_call:
    inputs:
      crate:
        required: true
        type: string

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    env:
      CRATE: ${{ inputs.crate }}
      SERVICE: mcp-${{ inputs.crate }}
      BINARY: botwork-mcp-${{ inputs.crate }}
      DOCKERFILE: containers/mcp-${{ inputs.crate }}/Dockerfile

    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: |
          ${{ inputs.crate }}
    - uses: docker/setup-buildx-action@v3

    - name: cargo fmt
      run: |
        set -euo pipefail
        cd "$CRATE"
        cargo fmt -- --check

    - name: cargo clippy
      run: |
        set -euo pipefail
        cd "$CRATE"
        cargo clippy --all-targets --locked -- -D warnings

    - name: cargo test
      run: |
        set -euo pipefail
        cd "$CRATE"
        cargo test --locked

    - name: cargo build
      run: |
        set -euo pipefail
        cd "$CRATE"
        cargo build --release --locked

    - name: Install hadolint
      run: |
        set -euo pipefail
        HADOLINT_VERSION=v2.12.0
        curl -fsSL -o /usr/local/bin/hadolint \
          "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64"
        chmod +x /usr/local/bin/hadolint
        hadolint --version

    - name: Lint Dockerfile
      run: hadolint --failure-threshold error "$DOCKERFILE"

    - name: Stage prebuilt binary
      run: |
        set -euo pipefail
        install -D -m 0755 "$CRATE/target/release/$BINARY" ".ci-prebuilt/$CRATE/$BINARY"

    - name: Build runtime image
      run: |
        set -euo pipefail
        docker buildx build \
          --platform linux/amd64 \
          --load \
          --build-arg BINARY_SOURCE=prebuilt \
          -t "botwork/$SERVICE:ci" \
          -f "$DOCKERFILE" \
          .

    - name: Smoke test image
      run: |
        set -euo pipefail
        cid="$(docker run -d --rm -p 18000:8000 "botwork/$SERVICE:ci")"
        cleanup() {
          docker rm -f "$cid" >/dev/null 2>&1 || true
        }
        trap cleanup EXIT

        ready=false
        for _ in $(seq 1 30); do
          if docker logs "$cid" 2>&1 | grep -q 'starting on 0.0.0.0:8000/mcp'; then
            ready=true
            break
          fi
          sleep 0.5
        done

        if [ "$ready" != true ]; then
          echo "container never reported readiness"
          docker logs "$cid" || true
          exit 1
        fi

        code="$(curl -s -o /dev/null -w '%{http_code}' -X POST http://127.0.0.1:18000/mcp || true)"
        echo "smoke http code: $code"
        if [ -z "$code" ] || [ "$code" = "000" ]; then
          docker logs "$cid" || true
          exit 1
        fi

        docker logs "$cid"

    - uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.crate }}-binary
        path: ${{ env.CRATE }}/target/release/${{ env.BINARY }}
