# Release / publish workflow
#
# Version-driven release cycle:
#   1. A developer sets the root VERSION file to a clean semver (e.g. "0.1.0"),
#      removes the "-dev" suffix, and merges to main.
#   2. Job A (publish) detects the clean version, builds and pushes the
#      mcp-echo container to GHCR, builds the echo release binary, and creates
#      a GitHub Release v<VERSION> with that binary attached.
#   3. Job B (bump) triggers on the published Release event, increments the
#      minor version, appends "-dev", and commits the new VERSION back to main
#      (e.g. "0.1.0" → "0.2.0-dev").
#   4. That "-dev" push to main is a no-op for Job A, completing the loop.
#
# How to cut a release:
#   - Edit VERSION (repo root) to a clean semver, e.g. "0.1.0"
#   - Open a PR, get it merged to main
#   - Automation handles everything else

name: Release

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Read VERSION
      id: version
      run: |
        set -euo pipefail
        raw="$(tr -d '[:space:]' < VERSION)"
        echo "version=${raw}" >> "$GITHUB_OUTPUT"
        if [[ "${raw}" == *-* ]]; then
          echo "is_release=false" >> "$GITHUB_OUTPUT"
          echo "VERSION=${raw} contains a pre-release suffix — skipping publish."
        else
          echo "is_release=true" >> "$GITHUB_OUTPUT"
          echo "VERSION=${raw} is a clean semver — proceeding with publish."
        fi

    - name: Log in to GHCR
      if: steps.version.outputs.is_release == 'true'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Install EarthBuild
      if: steps.version.outputs.is_release == 'true'
      run: |
        set -euo pipefail
        tmp="$(mktemp -d)"
        base="https://github.com/EarthBuild/earthbuild/releases/download/v0.8.17"
        curl -fsSL -o "${tmp}/earth-linux-amd64" "${base}/earth-linux-amd64"
        curl -fsSL -o "${tmp}/checksum.asc" "${base}/checksum.asc"
        ( cd "${tmp}" && grep ' earth-linux-amd64$' checksum.asc | sha256sum -c - )
        sudo install -m 0755 "${tmp}/earth-linux-amd64" /usr/local/bin/earthly
        earthly bootstrap

    - name: Build container images
      if: steps.version.outputs.is_release == 'true'
      run: |
        set -euo pipefail
        VERSION="${{ steps.version.outputs.version }}"
        earthly +mcp-echo-image
        docker tag "botwork/mcp-echo:local" "ghcr.io/botworkz/mcp/mcp-echo:${VERSION}"
        docker tag "botwork/mcp-echo:local" "ghcr.io/botworkz/mcp/mcp-echo:latest"

    - name: Push container images
      if: steps.version.outputs.is_release == 'true'
      run: |
        set -euo pipefail
        VERSION="${{ steps.version.outputs.version }}"
        docker push "ghcr.io/botworkz/mcp/mcp-echo:${VERSION}"
        docker push "ghcr.io/botworkz/mcp/mcp-echo:latest"

    - uses: dtolnay/rust-toolchain@stable
      if: steps.version.outputs.is_release == 'true'
    - uses: Swatinem/rust-cache@v2
      if: steps.version.outputs.is_release == 'true'

    - name: Build release binary
      if: steps.version.outputs.is_release == 'true'
      run: |
        set -euo pipefail
        cd echo
        cargo build --release --locked

    - name: Create GitHub Release and upload binary
      if: steps.version.outputs.is_release == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: v${{ steps.version.outputs.version }}
        fail_on_unmatched_files: true
        files: |
          echo/target/release/botwork-mcp-echo

  bump:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        ref: main
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Compute next minor dev version
      id: bump
      run: |
        set -euo pipefail
        tag="${{ github.event.release.tag_name }}"
        version="${tag#v}"
        version="${version%%-*}"
        IFS='.' read -r major minor patch <<< "${version}"
        next_minor=$(( minor + 1 ))
        next_version="${major}.${next_minor}.0-dev"
        echo "next_version=${next_version}" >> "$GITHUB_OUTPUT"
        echo "Released: ${version} → next dev: ${next_version}"

    - name: Bump VERSION and commit
      run: |
        set -euo pipefail
        echo "${{ steps.bump.outputs.next_version }}" > VERSION
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add VERSION
        git commit -m "chore: bump VERSION to ${{ steps.bump.outputs.next_version }} [skip ci]"
        git push origin main
