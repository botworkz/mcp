name: Containers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install hadolint
      run: |
        set -euo pipefail
        HADOLINT_VERSION=v2.12.0
        curl -fsSL -o /usr/local/bin/hadolint \
          "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64"
        chmod +x /usr/local/bin/hadolint
        hadolint --version
    - name: Lint Dockerfiles
      run: |
        set -euo pipefail
        find containers -mindepth 2 -maxdepth 2 -name Dockerfile -print0 \
          | xargs -0 -n1 hadolint --failure-threshold error

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
        - mcp-echo
        - mcp-glint
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - name: Build ${{ matrix.service }}
      run: |
        set -euo pipefail
        service="${{ matrix.service }}"
        case "$service" in
          mcp-echo)      ctx="." ;;
          mcp-glint)     ctx="." ;;
        esac
        docker buildx build \
          --platform linux/amd64 \
          --load \
          -t "botwork/${service}:local" \
          -f "containers/${service}/Dockerfile" \
          "$ctx"
    - name: Smoke test ${{ matrix.service }}
      run: |
        set -euo pipefail
        image="botwork/${{ matrix.service }}:local"
        case "${{ matrix.service }}" in
          mcp-echo)
            cid=$(docker run -d --rm -p 18000:8000 "$image")
            trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT
            for _ in $(seq 1 30); do
              if docker logs "$cid" 2>&1 | grep -q 'starting on 0.0.0.0:8000/mcp'; then
                break
              fi
              sleep 0.5
            done
            docker logs "$cid"
            code=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://127.0.0.1:18000/mcp || true)
            echo "smoke http code: $code"
            test -n "$code"
            ;;
          mcp-glint)
            cid=$(docker run -d --rm -p 18000:8000 "$image")
            trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT
            for _ in $(seq 1 30); do
              if docker logs "$cid" 2>&1 | grep -q 'starting on 0.0.0.0:8000/mcp'; then
                break
              fi
              sleep 0.5
            done
            docker logs "$cid"
            code=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://127.0.0.1:18000/mcp || true)
            echo "smoke http code: $code"
            test -n "$code"
            ;;
        esac

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
    - name: Read VERSION
      id: version
      run: |
        set -euo pipefail
        version="$(cat VERSION 2>/dev/null | tr -d '[:space:]' || true)"
        if [ -z "$version" ]; then
          version="0.0.0-dev"
        fi
        echo "value=$version" >> "$GITHUB_OUTPUT"
    - name: Skip dev publish
      if: endsWith(steps.version.outputs.value, '-dev')
      run: echo "skipping publish for dev version ${{ steps.version.outputs.value }}"
    - uses: docker/setup-buildx-action@v3
      if: ${{ !endsWith(steps.version.outputs.value, '-dev') }}
    - run: make -C containers containers VERSION=${{ steps.version.outputs.value }}
      if: ${{ !endsWith(steps.version.outputs.value, '-dev') }}
    - uses: docker/login-action@v3
      if: ${{ !endsWith(steps.version.outputs.value, '-dev') }}
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Publish images
      if: ${{ !endsWith(steps.version.outputs.value, '-dev') }}
      env:
        VERSION: ${{ steps.version.outputs.value }}
      run: |
        set -euo pipefail
        for svc in mcp-echo mcp-glint; do
          docker tag "botwork/${svc}:local" "ghcr.io/botworkz/mcp/${svc}:${VERSION}"
          docker tag "botwork/${svc}:local" "ghcr.io/botworkz/mcp/${svc}:latest"
          docker push "ghcr.io/botworkz/mcp/${svc}:${VERSION}"
          docker push "ghcr.io/botworkz/mcp/${svc}:latest"
        done
