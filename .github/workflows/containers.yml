name: Containers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install hadolint
      run: |
        set -euo pipefail
        HADOLINT_VERSION=v2.12.0
        curl -fsSL -o /usr/local/bin/hadolint \
          "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64"
        chmod +x /usr/local/bin/hadolint
        hadolint --version
    - name: Lint Dockerfiles
      run: |
        set -euo pipefail
        find containers -mindepth 2 -maxdepth 2 -name Dockerfile -print0 \
          | xargs -0 -n1 hadolint --failure-threshold error

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
        - mcp-echo
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - name: Build ${{ matrix.service }}
      run: |
        set -euo pipefail
        service="${{ matrix.service }}"
        case "$service" in
          mcp-echo)      ctx="." ;;
        esac
        docker buildx build \
          --platform linux/amd64 \
          --load \
          -t "botwork/${service}:local" \
          -f "containers/${service}/Dockerfile" \
          "$ctx"
    - name: Smoke test ${{ matrix.service }}
      run: |
        set -euo pipefail
        image="botwork/${{ matrix.service }}:local"
        case "${{ matrix.service }}" in
          mcp-echo)
            cid=$(docker run -d --rm -p 18000:8000 "$image")
            trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT
            for _ in $(seq 1 30); do
              if docker logs "$cid" 2>&1 | grep -q 'starting on 0.0.0.0:8000/mcp'; then
                break
              fi
              sleep 0.5
            done
            docker logs "$cid"
            code=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://127.0.0.1:18000/mcp || true)
            echo "smoke http code: $code"
            test -n "$code"
            ;;
        esac
