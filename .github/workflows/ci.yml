name: CI

on:
  push:
    branches: [main]
    paths:
    - .github/workflows/ci.yml
    - .github/workflows/_crate.yml
    - .dockerignore
    - Earthfile
    - VERSION
    - '**/Cargo.toml'
    - '**/Cargo.lock'
    - echo/**
  pull_request:
    branches: [main]
    paths:
    - .github/workflows/ci.yml
    - .github/workflows/_crate.yml
    - .dockerignore
    - Earthfile
    - VERSION
    - '**/Cargo.toml'
    - '**/Cargo.lock'
    - echo/**
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        # Single source of truth for tested crates: add the next crate directory name here.
        crate:
        - echo
    uses: ./.github/workflows/_crate.yml
    with:
      crate: ${{ matrix.crate }}

  publish:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: rust
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Read VERSION
      id: version
      run: |
        set -euo pipefail
        raw="$(tr -d '[:space:]' < VERSION)"
        echo "version=${raw}" >> "$GITHUB_OUTPUT"
        if [[ "${raw}" == *-* ]]; then
          echo "is_release=false" >> "$GITHUB_OUTPUT"
          echo "VERSION=${raw} contains a pre-release suffix — skipping publish."
        else
          echo "is_release=true" >> "$GITHUB_OUTPUT"
          echo "VERSION=${raw} is a clean semver — proceeding with publish."
        fi

    - name: Log in to GHCR
      if: steps.version.outputs.is_release == 'true'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Install EarthBuild
      if: steps.version.outputs.is_release == 'true'
      run: |
        set -euo pipefail
        tmp="$(mktemp -d)"
        base="https://github.com/EarthBuild/earthbuild/releases/download/v0.8.17"
        curl -fsSL -o "${tmp}/earth-linux-amd64" "${base}/earth-linux-amd64"
        curl -fsSL -o "${tmp}/checksum.asc" "${base}/checksum.asc"
        ( cd "${tmp}" && grep ' earth-linux-amd64$' checksum.asc | sha256sum -c - )
        sudo install -m 0755 "${tmp}/earth-linux-amd64" /usr/local/bin/earthly
        earthly bootstrap

    - uses: actions/download-artifact@v4
      if: steps.version.outputs.is_release == 'true'
      with:
        pattern: '*-binary'
        path: .ci-artifacts

    - name: Publish container images
      if: steps.version.outputs.is_release == 'true'
      run: |
        set -euo pipefail
        VERSION="${{ steps.version.outputs.version }}"
        for crate in echo; do
          service="mcp-${crate}"
          binary="botwork-mcp-${crate}"
          install -D -m 0755 ".ci-artifacts/${crate}-binary/${binary}" ".ci-prebuilt/${crate}/${binary}"
          earthly --push "+${service}-image" --BINARY_SOURCE=prebuilt --TAG="${VERSION}"
        done

    - name: Collect release files
      if: steps.version.outputs.is_release == 'true'
      id: release_files
      run: |
        set -euo pipefail
        {
          echo 'files<<EOF'
          find .ci-artifacts -mindepth 2 -maxdepth 2 -type f | sort
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"

    - name: Create GitHub Release and upload binaries
      if: steps.version.outputs.is_release == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: v${{ steps.version.outputs.version }}
        fail_on_unmatched_files: true
        files: ${{ steps.release_files.outputs.files }}

  bump:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        ref: main
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Compute next minor dev version
      id: bump
      run: |
        set -euo pipefail
        tag="${{ github.event.release.tag_name }}"
        version="${tag#v}"
        version="${version%%-*}"
        IFS='.' read -r major minor patch <<< "${version}"
        next_minor=$(( minor + 1 ))
        next_version="${major}.${next_minor}.0-dev"
        echo "next_version=${next_version}" >> "$GITHUB_OUTPUT"
        echo "Released: ${version} → next dev: ${next_version}"

    - name: Bump VERSION and commit
      run: |
        set -euo pipefail
        echo "${{ steps.bump.outputs.next_version }}" > VERSION
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add VERSION
        git commit -m "chore: bump VERSION to ${{ steps.bump.outputs.next_version }} [skip ci]"
        git push origin main
